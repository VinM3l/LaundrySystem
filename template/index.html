<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laundry Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* Header */
    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 20px; font-weight: 500; }
    .header p { font-size: 13px; color: #888; margin-top: 2px; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; margin-bottom: 1.5rem; border-bottom: 1px solid #e0dfd8; }
    .tab {
      padding: 9px 18px; font-size: 13px; font-weight: 500;
      cursor: pointer; color: #888; border: none; background: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      font-family: 'DM Sans', sans-serif;
    }
    .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
    .tab:hover:not(.active) { color: #444; }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; }

    /* Card */
    .card {
      background: #fff;
      border: 1px solid #e8e7e0;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    /* Form elements */
    label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
    input, select {
      width: 100%; padding: 8px 10px; font-size: 13px;
      border: 1px solid #e0dfd8; border-radius: 8px;
      background: #fff; color: #1a1a1a;
      font-family: 'DM Sans', sans-serif;
    }
    input:focus, select:focus { outline: none; border-color: #aaa; }
    input[readonly] { background: #f9f8f5; color: #888; }

    /* Grids */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .field-group { margin-bottom: 12px; }

    /* Section label */
    .form-header {
      font-size: 11px; font-weight: 500; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
    }

    .divider { border: none; border-top: 1px solid #f0efe8; margin: 1rem 0; }

    /* Price box */
    .price-box {
      background: #f9f8f5; border-radius: 8px;
      padding: 1rem; margin: 1rem 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .price-label { font-size: 12px; color: #888; }
    .price-breakdown { font-size: 12px; color: #aaa; margin-top: 3px; }
    .price-value { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; }

    /* Buttons */
    .btn {
      padding: 9px 18px; font-size: 13px; font-weight: 500;
      border-radius: 8px; border: 1px solid #e0dfd8;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      background: #fff; color: #1a1a1a;
    }
    .btn:hover { background: #f5f4f0; }
    .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn-primary:hover { background: #333; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-danger { color: #c0392b; border-color: #f5c6c2; }
    .btn-danger:hover { background: #fff5f4; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge-paid   { background: #e6f5ee; color: #1a7a45; }
    .badge-unpaid { background: #fff8e1; color: #b07d00; }
    .badge-rush   { background: #fdecea; color: #b71c1c; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; font-size: 11px; font-weight: 500; color: #aaa;
      padding: 8px; border-bottom: 1px solid #f0efe8;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    td { padding: 10px 8px; border-bottom: 1px solid #f5f4f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafaf7; }

    /* Stats */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat { background: #fff; border: 1px solid #e8e7e0; border-radius: 10px; padding: 1rem; }
    .stat-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-value { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }

    /* Misc */
    .empty { text-align: center; padding: 2.5rem; color: #aaa; font-size: 13px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-row input { flex: 1; }
    .search-row select { width: auto; }
    .mono { font-family: 'DM Mono', monospace; }
    .muted { color: #888; }

    @media (max-width: 600px) {
      .grid3, .grid4 { grid-template-columns: 1fr 1fr; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 420px) {
      .grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Laundry Manager</h1>
    <p id="currentDate"></p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add', this)">Add Transaction</button>
    <button class="tab" onclick="switchTab('receipts', this)">Receipts</button>
    <button class="tab" onclick="switchTab('expenses', this)">Expenses</button>
    <button class="tab" onclick="switchTab('summary', this)">Summary</button>
  </div>

  <!-- ── ADD TRANSACTION ── -->
  <div class="section active" id="tab-add">
    <div class="card">
      <div class="form-header">Transaction info</div>
      <div class="grid3 field-group">
        <div>
          <label>Date</label>
          <input type="date" id="t-date" onchange="updateWeekday()">
        </div>
        <div>
          <label>Weekday</label>
          <input type="text" id="t-weekday" readonly>
        </div>
        <div>
          <label>In Charge</label>
          <select id="t-incharge">
            <option value="">Select staff</option>
            <option>One</option>
            <option>Two</option>
            <option>Three</option>
            <option>Four</option>
          </select>
        </div>
      </div>

      <hr class="divider">
      <div class="form-header">Customer</div>

      <div class="field-group">
        <label>Customer Name</label>
        <input type="text" id="t-customer" placeholder="Enter name">
      </div>
      <div class="grid2 field-group">
        <div>
          <label>Weight (kilo)</label>
          <input type="number" id="t-weight" step="0.1" min="0" placeholder="0.0" oninput="calcPrice()">
        </div>
        <div>
          <label>Machine Used</label>
          <input type="text" id="t-machine" placeholder="e.g. 1, 2,3">
        </div>
      </div>
      <div class="grid3 field-group">
        <div>
          <label>Number of Loads</label>
          <input type="number" id="t-loads" min="1" value="1" oninput="calcPrice()">
        </div>
        <div>
          <label>Rush?</label>
          <select id="t-rush" onchange="calcPrice()">
            <option value="0">No</option>
            <option value="1">Yes (+₱50)</option>
          </select>
        </div>
        <div>
          <label>Extra per load?</label>
          <select id="t-pload" onchange="calcPrice()">
            <option value="0">No</option>
            <option value="1">Yes (+₱20/load)</option>
          </select>
        </div>
      </div>
      <div class="grid2 field-group">
        <div>
          <label>Half price?</label>
          <select id="t-half" onchange="calcPrice()">
            <option value="0">No</option>
            <option value="1">Yes (50% off)</option>
          </select>
        </div>
        <div>
          <label>Discount / Notes</label>
          <input type="text" id="t-notes" placeholder="e.g. 95 discount">
        </div>
      </div>

      <hr class="divider">

      <div class="price-box">
        <div>
          <div class="price-label">Computed total</div>
          <div class="price-breakdown" id="price-breakdown">—</div>
        </div>
        <div class="price-value" id="price-display">₱0</div>
      </div>

      <div class="grid2 field-group">
        <div>
          <label>Payment received (₱)</label>
          <input type="number" id="t-pay" placeholder="0" min="0">
        </div>
        <div>
          <label>Payment status</label>
          <select id="t-paid">
            <option value="0">Unpaid</option>
            <option value="1">Paid</option>
          </select>
        </div>
      </div>

      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:1rem;">
        <button class="btn" onclick="resetForm()">Clear</button>
        <button class="btn btn-primary" onclick="addTransaction()">Save transaction</button>
      </div>
    </div>
  </div>

  <!-- ── RECEIPTS ── -->
  <div class="section" id="tab-receipts">
    <div class="search-row">
      <input type="text" id="search" placeholder="Search customer, staff..." oninput="renderReceipts()">
      <select id="filter-paid" onchange="renderReceipts()">
        <option value="">All</option>
        <option value="0">Unpaid only</option>
        <option value="1">Paid only</option>
      </select>
    </div>
    <div class="card" style="padding:0; overflow:hidden;">
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Date</th><th>Customer</th><th>Staff</th>
              <th>Weight</th><th>Loads</th><th>Total</th><th>Paid</th><th>Status</th><th></th>
            </tr>
          </thead>
          <tbody id="receipts-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── EXPENSES ── -->
  <div class="section" id="tab-expenses">
    <div class="card">
      <div class="form-header">Add expense</div>
      <div class="grid4 field-group">
        <div>
          <label>Date</label>
          <input type="date" id="e-date">
        </div>
        <div>
          <label>Description</label>
          <input type="text" id="e-name" placeholder="e.g. Gas, Machine Repair">
        </div>
        <div>
          <label>Qty</label>
          <input type="number" id="e-qty" value="1" min="1">
        </div>
        <div>
          <label>Amount (₱)</label>
          <input type="number" id="e-amount" placeholder="0">
        </div>
      </div>
      <div style="display:flex; justify-content:flex-end;">
        <button class="btn btn-primary" onclick="addExpense()">Add expense</button>
      </div>
    </div>
    <div class="card" style="padding:0; overflow:hidden;">
      <table>
        <thead>
          <tr><th>Date</th><th>Description</th><th>Qty</th><th>Amount</th><th></th></tr>
        </thead>
        <tbody id="expenses-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ── SUMMARY ── -->
  <div class="section" id="tab-summary">
    <div class="stat-grid" id="summary-stats"></div>
    <div class="card">
      <div class="form-header">Pricing reference</div>
      <div class="grid4" style="gap:8px;">
        <div style="padding:10px; background:#f9f8f5; border-radius:8px;">
          <div style="font-size:11px; color:#aaa; margin-bottom:2px;">Wash</div>
          <div class="mono" style="font-weight:500;">₱100 / load</div>
        </div>
        <div style="padding:10px; background:#f9f8f5; border-radius:8px;">
          <div style="font-size:11px; color:#aaa; margin-bottom:2px;">Dry</div>
          <div class="mono" style="font-weight:500;">₱90 / load</div>
        </div>
        <div style="padding:10px; background:#f9f8f5; border-radius:8px;">
          <div style="font-size:11px; color:#aaa; margin-bottom:2px;">Rush surcharge</div>
          <div class="mono" style="font-weight:500;">+₱50</div>
        </div>
        <div style="padding:10px; background:#f9f8f5; border-radius:8px;">
          <div style="font-size:11px; color:#aaa; margin-bottom:2px;">Extra / load</div>
          <div class="mono" style="font-weight:500;">+₱20</div>
        </div>
      </div>
    </div>
    <div class="card" style="padding:0; overflow:hidden;">
      <div style="padding:1rem 1.25rem; border-bottom:1px solid #f0efe8;">
        <div style="font-size:13px; font-weight:500;">Unpaid transactions</div>
      </div>
      <table>
        <thead><tr><th>Customer</th><th>Date</th><th>Amount</th></tr></thead>
        <tbody id="unpaid-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="/static/main.js"></script>
</body>
</html>
